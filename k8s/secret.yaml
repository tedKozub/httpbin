# NOTE: rendered at deploy time with `envsubst` (see k8s/README.md
# and .github/workflows/ci.yml). The plaintext value of
# HTTPBIN_SECRET_KEY is never committed to git — only the placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: httpbin-secret
  labels:
    app: httpbin
type: Opaque
stringData:
  HTTPBIN_SECRET_KEY: "${HTTPBIN_SECRET_KEY}"
