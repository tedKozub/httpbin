name: CI

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --select E9,F63,F7,F82 httpbin/ test_httpbin.py

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . pytest

      - name: Run pytest
        run: pytest test_httpbin.py

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      # Skip B324 (MD5): MD5 is mandated by the HTTP Digest auth spec
      # (RFC 2617) for protocol compatibility, not used for security here.
      - name: Run bandit
        run: bandit -r httpbin/ -ll --skip B324

  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e . pip-audit

      # Audits installed dependencies for known CVEs.
      # No --strict: avoids failing on warning that our own
      # editable-installed package (httpbin 0.9.2) isn't on PyPI.
      - name: Run pip-audit
        run: pip-audit

  secrets:
    name: Secrets scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --only-verified

  build:
    name: Build & push image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [lint, test, sast, pip-audit, secrets]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute lowercase image name
        id: image
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          echo "ref=ghcr.io/${repo_lc}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${repo_lc}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy:
    name: Image scan (trivy)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
